name: release

on:
  push:
    tags:
      - 'release/v[0-9]+.[0-9]+.[0-9]+'

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: true

      matrix:
        os: [ubuntu-latest, macos-14, ubuntu-24.04-arm, macos-15-intel, windows-latest]
        build_type: [Release]
        staticcompile: [ON]

    steps:
    - name: Set up MSYS2
      if: contains(matrix.os, 'windows')
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >-
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-cmake
          mingw-w64-x86_64-ninja
          make
          mingw-w64-x86_64-gmp
          mingw-w64-x86_64-zlib

    - name: Install dependencies for Linux
      if: contains(matrix.os, 'ubuntu')
      run: sudo apt-get update && sudo apt-get install -yq help2man libgmp-dev

    - name: Install gmp for Mac
      if: contains(matrix.os, 'macos')
      run: |
        wget https://ftp.gnu.org/gnu/gmp/gmp-6.3.0.tar.xz
        tar xf gmp-6.3.0.tar.xz
        cd gmp-6.3.0
        ./configure --enable-static --enable-cxx --enable-shared --with-pic
        make -j8
        sudo make install
        cd ..

    - name: Install zlib for Mac static
      if: contains(matrix.os, 'macos')
      run: |
        wget https://zlib.net/fossils/zlib-1.3.1.tar.gz
        tar xzvf zlib-1.3.1.tar.gz
        cd zlib-1.3.1
        ./configure --static
        make -j8
        sudo make install
        cd ..

    - name: checkout
      uses: actions/checkout@v4
      with:
        path: project
        submodules: 'true'

    - name: Configure & build (Windows)
      if: contains(matrix.os, 'windows')
      shell: msys2 {0}
      run: |
        cd project
        mkdir -p build && cd build
        cmake \
        -DENABLE_TESTING=OFF \
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
        -DIPASIR=ON \
        -DBUILD_SHARED_LIBS=OFF \
        -G Ninja \
        -S ..
        cmake --build . --config ${{ matrix.build_type }} -v

    - name: Configure & build (non-Windows)
      if: "!contains(matrix.os, 'windows')"
      run: |
        cd project
        mkdir -p build && cd build
        cmake \
        -DENABLE_TESTING=OFF \
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
        -DIPASIR=ON \
        -DBUILD_SHARED_LIBS=OFF \
        -S ..
        cmake --build . --config ${{ matrix.build_type }} -v

    - name: run it to check it executes (Windows)
      if: contains(matrix.os, 'windows')
      shell: msys2 {0}
      run: |
        ./project/build/cryptominisat5.exe --version
        echo $?

    - name: run it to check it executes (non-Windows)
      if: "!contains(matrix.os, 'windows')"
      run: |
        ./project/build/cryptominisat5 --version
        echo $?

    - name: Package artifacts (Windows)
      if: contains(matrix.os, 'windows')
      shell: bash
      run: |
        TAG=${{ github.ref_name }}
        ARCHIVE="cryptominisat5-${TAG}-windows-x86_64.zip"
        7z a "${ARCHIVE}" ./project/build/cryptominisat5.exe
        echo "ARCHIVE=${ARCHIVE}" >> $GITHUB_ENV

    - name: Package artifacts (non-Windows)
      if: "!contains(matrix.os, 'windows')"
      run: |
        TAG="${{ github.ref_name }}"
        TAG="${TAG#release/}"
        if [[ "${{ matrix.os }}" == "ubuntu-latest" ]]; then
          ARCH="linux-amd64"
        elif [[ "${{ matrix.os }}" == "ubuntu-24.04-arm" ]]; then
          ARCH="linux-arm64"
        elif [[ "${{ matrix.os }}" == "macos-14" ]]; then
          ARCH="mac-arm64"
        elif [[ "${{ matrix.os }}" == "macos-15-intel" ]]; then
          ARCH="mac-x86_64"
        fi
        ARCHIVE="cryptominisat5-${TAG}-${ARCH}.tar.gz"
        tar czf "${ARCHIVE}" \
          -C project/build \
          cryptominisat5
        echo "ARCHIVE=${ARCHIVE}" >> $GITHUB_ENV

    - name: Upload release asset
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.ARCHIVE }}
        path: ${{ env.ARCHIVE }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        merge-multiple: true

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        name: CryptoMiniSat ${{ github.ref_name }}
        generate_release_notes: true
        files: artifacts/*
