name: build

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "*" ]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: true

      matrix:
        os: [ubuntu-latest, macos-14, ubuntu-24.04-arm, macos-15-intel, windows-latest]
        build_type: [Release]
        shared_libs: [OFF, ON]

    steps:
    - name: Set up MSYS2
      if: contains(matrix.os, 'windows')
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >-
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-cmake
          mingw-w64-x86_64-ninja
          make
          mingw-w64-x86_64-gmp
          mingw-w64-x86_64-zlib

    - name: Install dependencies for Linux
      if: contains(matrix.os, 'ubuntu')
      run: sudo apt-get update && sudo apt-get install -yq help2man libgmp-dev

    - name: Install gmp for Mac
      if: contains(matrix.os, 'macos')
      run: |
        wget https://ftp.gnu.org/gnu/gmp/gmp-6.3.0.tar.xz
        tar xf gmp-6.3.0.tar.xz
        cd gmp-6.3.0
        ./configure --enable-static --enable-cxx --enable-shared --with-pic
        make -j8
        sudo make install
        cd ..

    - name: Install zlib for Mac dynamic
      if: contains(matrix.os, 'macos') && matrix.shared_libs == 'ON'
      run: |
        wget https://zlib.net/fossils/zlib-1.3.1.tar.gz
        tar xzvf zlib-1.3.1.tar.gz
        cd zlib-1.3.1
        ./configure
        make -j8
        sudo make install
        cd ..

    - name: Install zlib for Mac static
      if: contains(matrix.os, 'macos') && matrix.shared_libs == 'OFF'
      run: |
        wget https://zlib.net/fossils/zlib-1.3.1.tar.gz
        tar xzvf zlib-1.3.1.tar.gz
        cd zlib-1.3.1
        ./configure --static
        make -j8
        sudo make install
        cd ..

    - name: checkout
      uses: actions/checkout@v4
      with:
        path: project
        submodules: 'true'

    - name: Set up ccache
      if: "!contains(matrix.os, 'windows')"
      uses: hendrikmuhs/ccache-action@v1
      with:
        key: ${{ matrix.os }}-${{ matrix.build_type }}-${{ matrix.shared_libs }}

    - name: Configure & build (Windows)
      if: contains(matrix.os, 'windows')
      shell: msys2 {0}
      run: |
        cd project
        mkdir -p build && cd build
        cmake \
        -DENABLE_TESTING=OFF \
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
        -DIPASIR=ON \
        -DBUILD_SHARED_LIBS=${{ matrix.shared_libs }} \
        -G Ninja \
        -S ..
        cmake --build . --config ${{matrix.build_type}} -v

    - name: Configure & build (non-Windows)
      if: "!contains(matrix.os, 'windows')"
      shell: bash
      run: |
        cd project
        mkdir -p build && cd build
        cmake \
        -DENABLE_TESTING=OFF \
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
        -DIPASIR=ON \
        -DBUILD_SHARED_LIBS=${{ matrix.shared_libs }} \
        -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
        -S ..
        cmake --build . --config ${{matrix.build_type}} -v

    - name: run it to check it executes (Windows)
      if: contains(matrix.os, 'windows')
      shell: msys2 {0}
      run: |
        export PATH="./project/build:./project/build/cmsat5-src:$PATH"
        EXE=./project/build/cryptominisat5.exe
        echo "Running: $EXE --version"
        $EXE --version
        echo $?
        echo "Running: $EXE --help"
        $EXE --help
        echo $?

    - name: run it to check it executes (non-Windows)
      if: "!contains(matrix.os, 'windows')"
      shell: bash
      run: |
        EXE=./project/build/cryptominisat5
        echo "Running: $EXE --version"
        $EXE --version
        echo $?
        echo "Running: $EXE --help"
        $EXE --help
        echo $?

    - name: Test
      if: "!contains(matrix.os, 'windows')"
      run: ctest -C ${{matrix.build_type}} --verbose

    - name: Upload Artifact - Linux
      if: contains(matrix.os, 'ubuntu') && matrix.shared_libs == 'OFF' && !contains(matrix.os, 'arm')
      uses: actions/upload-artifact@v4
      with:
        name: cryptominisat5-linux-amd64
        path: |
          project/build/cryptominisat5
          project/build/lib/*
          project/build/include/*

    - name: Upload Artifact - Linux arm
      if: contains(matrix.os, 'ubuntu') && matrix.shared_libs == 'OFF' && contains(matrix.os, 'arm')
      uses: actions/upload-artifact@v4
      with:
        name: cryptominisat-linux-arm64
        path: |
          project/build/cryptominisat5
          project/build/lib/*
          project/build/include/*

    - name: Upload Artifact - Mac ARM64
      if: matrix.os == 'macos-14' && matrix.shared_libs == 'OFF'
      uses: actions/upload-artifact@v4
      with:
        name: cryptominisat5-mac-arm64
        path: |
          project/build/cryptominisat5
          project/build/lib/*
          project/build/include/*

    - name: Upload Artifact - Mac x86_64
      if: matrix.os == 'macos-15-intel' && matrix.shared_libs == 'OFF'
      uses: actions/upload-artifact@v4
      with:
        name: cryptominisat5-mac-x86_64
        path: |
          project/build/cryptominisat5
          project/build/lib/*
          project/build/include/*

    - name: Upload Artifact - Windows
      if: matrix.os == 'windows-latest' && matrix.shared_libs == 'OFF'
      uses: actions/upload-artifact@v4
      with:
        name: cryptominisat5-windows-x86_64
        path: |
          project/build/cryptominisat5.exe
